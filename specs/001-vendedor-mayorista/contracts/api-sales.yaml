# API Contract: Wholesale Sales Endpoints
# Feature: Vendedor Mayorista Role
# Purpose: Define wholesale sales creation and retrieval

openapi: 3.0.0
info:
  title: ElectroVenza Wholesale Sales API
  version: 1.0.0
  description: Wholesale sales endpoints with cash-only transactions

paths:
  /articulos:
    get:
      summary: List products
      description: Get product list with optional wholesale price filtering
      security:
        - bearerAuth: []
      parameters:
        - name: precio_mayorista_required
          in: query
          description: Filter products that have wholesale pricing
          required: false
          schema:
            type: boolean
            default: false
        - name: categoria_id
          in: query
          description: Filter by category
          required: false
          schema:
            type: integer
        - name: activo
          in: query
          description: Filter by active status
          required: false
          schema:
            type: boolean
            default: true
        - name: search
          in: query
          description: Search by product name
          required: false
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ventas-mayorista:
    post:
      summary: Create wholesale sale
      description: Create a new cash-only wholesale sale
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - cliente_id
                - metodo_pago
                - items
              properties:
                cliente_id:
                  type: integer
                  description: Wholesale customer ID
                  example: 123
                vendedor_id:
                  type: integer
                  description: Seller ID (auto-set from JWT if not provided)
                  example: 42
                metodo_pago:
                  type: string
                  enum:
                    - efectivo
                    - transferencia
                    - cheque
                  example: "efectivo"
                observaciones:
                  type: string
                  maxLength: 500
                  example: "Entrega inmediata solicitada"
                items:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - articulo_id
                      - cantidad
                    properties:
                      articulo_id:
                        type: integer
                        example: 456
                      cantidad:
                        type: integer
                        minimum: 1
                        example: 5
                      # precio_unitario is auto-calculated from precio_mayorista (backend sets)
      responses:
        '201':
          description: Sale created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sale'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    examples:
                      stockInsuficiente:
                        value: "Stock insuficiente para el artículo ID 456. Disponible: 3, Solicitado: 5"
                      clienteInvalido:
                        value: "El cliente no es de tipo mayorista"
                      vendedorNoAsignado:
                        value: "El cliente no está asignado a este vendedor"
                      precioMayoristaFaltante:
                        value: "El artículo ID 456 no tiene precio mayorista definido"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden - seller trying to sell to customer not in their portfolio
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No tiene permiso para vender a este cliente"
        '404':
          description: Customer or product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cliente o artículo no encontrado"

    get:
      summary: List wholesale sales
      description: Get list of wholesale sales for current seller or all (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: vendedor_id
          in: query
          description: Filter by seller (required for non-admin, auto-set for sellers)
          required: false
          schema:
            type: integer
        - name: fecha_desde
          in: query
          description: Filter sales from this date
          required: false
          schema:
            type: string
            format: date
        - name: fecha_hasta
          in: query
          description: Filter sales until this date
          required: false
          schema:
            type: string
            format: date
        - name: cliente_id
          in: query
          description: Filter by customer
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: List of wholesale sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sale'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ventas-mayorista/{id}:
    get:
      summary: Get sale by ID
      description: Retrieve wholesale sale details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Sale details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleDetailed'
        '404':
          $ref: '#/components/responses/NotFound'
        '403':
          description: Forbidden - sale belongs to another seller
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "No tiene permiso para acceder a esta venta"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 456
        nombre:
          type: string
          example: "Heladera Samsung 350L"
        categoria_id:
          type: integer
          example: 5
        categoria_nombre:
          type: string
          example: "Heladeras"
        precio:
          type: number
          format: decimal
          description: Retail price
          example: 450000.00
        precio_mayorista:
          type: number
          format: decimal
          description: Wholesale price
          nullable: true
          example: 380000.00
        stock_disponible:
          type: integer
          example: 12
        imagen_url:
          type: string
          nullable: true
          example: "https://cdn.example.com/products/heladera-samsung-350l.jpg"
        activo:
          type: boolean
          example: true
        descripcion:
          type: string
          nullable: true
          example: "Heladera Samsung con freezer, no frost, eficiencia A+"

    Sale:
      type: object
      properties:
        id:
          type: integer
          example: 789
        cliente_id:
          type: integer
          example: 123
        cliente_nombre:
          type: string
          example: "Comercial San Martín"
        vendedor_id:
          type: integer
          example: 42
        vendedor_nombre:
          type: string
          example: "Juan Pérez"
        tipo_venta:
          type: string
          enum:
            - mayorista
          example: "mayorista"
        fecha_venta:
          type: string
          format: date-time
          example: "2025-12-29T14:30:00Z"
        monto_total:
          type: number
          format: decimal
          example: 1900000.00
        estado:
          type: string
          enum:
            - completada
            - anulada
          example: "completada"
        metodo_pago:
          type: string
          enum:
            - efectivo
            - transferencia
            - cheque
          example: "efectivo"
        observaciones:
          type: string
          nullable: true
          example: "Entrega inmediata solicitada"
        cantidad_items:
          type: integer
          description: Total number of line items
          example: 5

    SaleDetailed:
      allOf:
        - $ref: '#/components/schemas/Sale'
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1001
                  articulo_id:
                    type: integer
                    example: 456
                  articulo_nombre:
                    type: string
                    example: "Heladera Samsung 350L"
                  cantidad:
                    type: integer
                    example: 5
                  precio_unitario:
                    type: number
                    format: decimal
                    description: Wholesale price used for this item
                    example: 380000.00
                  subtotal:
                    type: number
                    format: decimal
                    example: 1900000.00

  responses:
    Unauthorized:
      description: Unauthorized - invalid or missing token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Token inválido o expirado"

    Forbidden:
      description: Forbidden - insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "No tiene permiso para realizar esta acción"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Recurso no encontrado"

# Frontend Implementation Notes:
# 1. Wholesale sellers call: GET /articulos?precio_mayorista_required=true
# 2. Display products showing precio_mayorista field
# 3. On sale creation, send items with only articulo_id and cantidad
# 4. Backend auto-calculates precio_unitario from precio_mayorista
# 5. Backend validates stock availability before creating sale
# 6. Backend validates customer is mayorista type and assigned to seller
# 7. Backend atomically decrements stock on sale creation
# 8. Frontend refreshes product list after successful sale to show updated stock
# 9. Sale estado is always "completada" immediately (no pending state)
# 10. metodo_pago is required (efectivo, transferencia, or cheque)
