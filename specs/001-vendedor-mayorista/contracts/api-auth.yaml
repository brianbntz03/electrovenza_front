# API Contract: Authentication Endpoints
# Feature: Vendedor Mayorista Role
# Purpose: Define authentication and role-based session management

openapi: 3.0.0
info:
  title: ElectroVenza Authentication API
  version: 1.0.0
  description: Authentication endpoints with wholesale seller role support

paths:
  /auth/login:
    post:
      summary: User login
      description: Authenticate user and return JWT token with role information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "juan.mayorista"
                password:
                  type: string
                  format: password
                  example: "securePassword123"
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token containing user_id, role, and expiration
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 42
                      username:
                        type: string
                        example: "juan.mayorista"
                      nombre_completo:
                        type: string
                        example: "Juan Pérez"
                      role:
                        type: string
                        enum:
                          - administrador
                          - vendedor_minorista
                          - vendedor_mayorista
                        example: "vendedor_mayorista"
                      email:
                        type: string
                        format: email
                        example: "juan@example.com"
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Usuario o contraseña incorrectos"
        '400':
          description: Bad request (missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Username y password son requeridos"

  /auth/verify:
    get:
      summary: Verify JWT token
      description: Validate current session and return user info
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Valid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: integer
                      username:
                        type: string
                      nombre_completo:
                        type: string
                      role:
                        type: string
                        enum:
                          - administrador
                          - vendedor_minorista
                          - vendedor_mayorista
        '401':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Token inválido o expirado"

  /auth/logout:
    post:
      summary: User logout
      description: Invalidate current session (client-side token removal primarily)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful logout
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sesión cerrada exitosamente"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  schemas:
    JWTPayload:
      type: object
      description: Decoded JWT token payload structure
      properties:
        user_id:
          type: integer
          description: Unique user identifier
        username:
          type: string
        role:
          type: string
          enum:
            - administrador
            - vendedor_minorista
            - vendedor_mayorista
        exp:
          type: integer
          description: Token expiration timestamp (Unix epoch)
        iat:
          type: integer
          description: Token issued at timestamp (Unix epoch)

# Frontend Implementation Notes:
# 1. Store JWT token in localStorage (key: "auth_token")
# 2. Store user role in localStorage (key: "user_role")
# 3. Store user ID in localStorage (key: "user_id")
# 4. Include token in Authorization header: "Bearer {token}"
# 5. On 401 response, clear localStorage and redirect to login
# 6. Decode JWT using jwt-decode library to extract role
